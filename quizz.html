<!DOCTYPE html>
<html>
<head>
    <title>Quiz App - Quiz</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at top left, rgba(7, 135, 119, 0.25), transparent 28%), linear-gradient(180deg, #021b14 0%, #08332a 100%);
            color: #ebf6f1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }
        form {
            width: min(720px, 100%);
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.14);
            border-radius: 32px;
            padding: 36px;
            box-shadow: 0 32px 90px rgba(0, 0, 0, 0.24);
            backdrop-filter: blur(16px);
        }
        h3 {
            margin: 0 0 20px;
            color: #f5fcf8;
            font-size: 1.95rem;
            text-align: center;
            letter-spacing: 0.02em;
        }
        .feedback {
            text-align: center;
            margin-bottom: 20px;
            font-size: 1rem;
            font-weight: 700;
            padding: 12px 18px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.08);
        }
        .feedback.wrong {
            color: #ffd8d8;
            background: rgba(255, 125, 125, 0.14);
        }
        .feedback:not(.wrong) {
            color: #b7f3ca;
            background: rgba(75, 214, 159, 0.14);
        }
        .options {
            display: grid;
            gap: 16px;
            margin-bottom: 20px;
        }
        .option {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 18px 20px;
            border: 1px solid rgba(255, 255, 255, 0.16);
            border-radius: 22px;
            background: rgba(255, 255, 255, 0.06);
            cursor: pointer;
            transition: transform 0.2s ease, border-color 0.2s ease, background-color 0.2s ease;
        }
        .option:hover {
            transform: translateY(-1px);
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(109, 226, 195, 0.4);
        }
        input[type="radio"] {
            width: 18px;
            height: 18px;
            accent-color: #5be5b8;
            cursor: pointer;
        }
        button {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 20px;
            background: linear-gradient(135deg, #4ade80, #10b981);
            color: #011f10;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 18px 30px rgba(16, 185, 129, 0.25);
        }
        a {
            position: absolute;
            top: 24px;
            right: 24px;
            color: #9dd6c9;
            text-decoration: none;
            font-weight: 600;
        }
        @media (max-width: 760px) {
            form { padding: 28px; }
            h3 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>
    <form method="post">
        {% if feedback %}
        <p class="feedback {% if feedback == 'Wrong!' %}wrong{% endif %}">{{ feedback }}</p>
        {% endif %}
        <h3>Question {{ question_number }} out of {{ total_questions }}: {{ q[1] }}</h3>
        <div class="options">
            <label class="option">
                <input type="radio" name="answer" value="{{ q[2] }}" required> {{ q[2] }}
            </label>
            <label class="option">
                <input type="radio" name="answer" value="{{ q[3] }}" required> {{ q[3] }}
            </label>
            <label class="option">
                <input type="radio" name="answer" value="{{ q[4] }}" required> {{ q[4] }}
            </label>
            <label class="option">
                <input type="radio" name="answer" value="{{ q[5] }}" required> {{ q[5] }}
            </label>
        </div>
        <button>Next</button>
    </form>
    <a href="/logout" style="position: absolute; top: 10px; right: 10px; color: #2196F3; text-decoration: none;">Logout</a>
</body>
</html>
