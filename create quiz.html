<!DOCTYPE html>
<html>
<head>
    <title>Quiz App - Create Quiz</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at top right, rgba(93, 193, 255, 0.22), transparent 30%), linear-gradient(180deg, #071522 0%, #0f314f 100%);
            color: #eef8ff;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }
        form {
            width: min(520px, 100%);
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.16);
            border-radius: 32px;
            padding: 34px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(14px);
        }
        h2 {
            margin: 0 0 22px;
            font-size: 2rem;
            text-align: center;
            letter-spacing: 0.03em;
            color: #ffffff;
        }
        input {
            width: 100%;
            padding: 14px 16px;
            margin: 12px 0;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            outline: none;
            transition: border-color 0.25s ease, box-shadow 0.25s ease;
        }
        input:focus {
            border-color: #7ec1ff;
            box-shadow: 0 0 0 4px rgba(126, 193, 255, 0.14);
        }
        button {
            width: 100%;
            padding: 14px 16px;
            border-radius: 16px;
            border: none;
            background: linear-gradient(135deg, #4097ff, #2e6bfd);
            color: white;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 18px 34px rgba(64, 151, 255, 0.24);
        }
        a {
            position: absolute;
            top: 24px;
            right: 24px;
            color: #a9d9ff;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <form method="post">
        <h2>Add Question</h2>
        <input name="q" placeholder="Question" required><br>
        <input name="op1" placeholder="Option 1" required><br>
        <input name="op2" placeholder="Option 2" required><br>
        <input name="op3" placeholder="Option 3" required><br>
        <input name="op4" placeholder="Option 4" required><br>
        <input name="ans" placeholder="Correct Answer" required><br>
        <button>Add</button>
    </form>
    <a href="/logout" style="position: absolute; top: 10px; right: 10px; color: #2196F3; text-decoration: none;">Logout</a>
</body>
</html>
