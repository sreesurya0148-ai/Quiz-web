<!DOCTYPE html>
<html>
<head>
    <title>Quiz App - Result</title>
    <style>
        :root {
            color-scheme: dark;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at top left, rgba(103, 235, 171, 0.16), transparent 24%),
                        radial-gradient(circle at bottom right, rgba(93, 133, 255, 0.14), transparent 24%),
                        linear-gradient(135deg, #06121b 0%, #092d39 100%);
            display: grid;
            place-items: center;
            padding: 28px;
            color: #eef9f4;
        }
        .result-card {
            width: min(100%, 520px);
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 34px;
            padding: 36px 32px;
            box-shadow: 0 32px 88px rgba(0, 0, 0, 0.24);
            backdrop-filter: blur(14px);
            text-align: center;
        }
        .result-card h2 {
            margin: 0;
            font-size: 2.8rem;
            letter-spacing: -0.04em;
        }
        .result-card p {
            margin: 16px auto 0;
            max-width: 420px;
            font-size: 1rem;
            color: #cfe9e1;
            line-height: 1.75;
        }
        .action-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 16px;
            margin-top: 32px;
        }
        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 160px;
            padding: 14px 22px;
            border-radius: 999px;
            text-decoration: none;
            font-weight: 700;
            color: #fff;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .button-primary {
            background: linear-gradient(135deg, #4ad8a5, #1e9f7d);
        }
        .button-secondary {
            background: linear-gradient(135deg, #4a94ff, #276bff);
        }
        .button:hover {
            transform: translateY(-1px);
            box-shadow: 0 18px 34px rgba(32, 136, 164, 0.24);
        }
        .score-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-top: 22px;
            padding: 18px 24px;
            border-radius: 999px;
            background: linear-gradient(135deg, rgba(79, 214, 170, 0.12), rgba(45, 163, 255, 0.12));
            border: 1px solid rgba(255, 255, 255, 0.14);
            font-size: 1.1rem;
            font-weight: 700;
            color: #e9f9f5;
        }
        @media (max-width: 600px) {
            .result-card { padding: 28px 22px; }
            .result-card h2 { font-size: 2.3rem; }
            .action-buttons { flex-direction: column; }
            .button { width: 100%; }
        }
    </style>
</head>
<body>
    <section class="result-card">
        <h2>Quiz Complete</h2>
        <div class="score-badge">Your Score: {{ score }}</div>
        <p>Nice work! Review the leaderboard to see how you stack up and logout when you're done.</p>
        <div class="action-buttons">
            <a class="button button-primary" href="/leaderboard">View Leaderboard</a>
            <a class="button button-secondary" href="/logout">Logout</a>
        </div>
    </section>
</body>
</html>
